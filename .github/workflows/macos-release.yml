name: macOS Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: Eqavo-aarch64.dmg

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Metal toolchain
        shell: bash
        run: |
          latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)"
          if [[ -n "$latest_xcode" ]]; then
            sudo xcode-select -s "$latest_xcode/Contents/Developer"
            xcodebuild -version
          fi
          if ! xcrun -f metal >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Bootstrap
        shell: bash
        run: ./scripts/bootstrap.sh

      - name: Sync upstream source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Pinned Zed version: $(cat zed-version.txt)"
          source .venv/bin/activate
          python3 scripts/sync_zed.py

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .workdir/zed-src

      - name: Build package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EQAVO_SKIP_SYNC: "1"
        run: bash ./scripts/package_macos.sh ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: .workdir/zed-src/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eqavo-${{ matrix.target }}.app
          path: .workdir/zed-src/target/${{ matrix.target }}/release/bundle/osx/Eqavo.app
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: .workdir/zed-src/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
