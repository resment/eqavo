name: macOS Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: Eqavo-aarch64.dmg
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: Eqavo-x86_64.dmg

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Build package
        run: ./scripts/package_macos.sh ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: .workdir/zed-src/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Publish release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: .workdir/zed-src/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
